<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Словарь - Тренажер английского</title>
    
    <!-- Подключаем Tailwind CSS для стилей -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Классическое подключение React и ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Подключаем Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Настраиваем Babel на классический надежный режим работы с React -->
    <script>
        Babel.registerPreset('react-classic', {
            presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]]
        });
    </script>
    
    <style>
        /* Дополнительные стили для анимаций */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen">
    <div id="root"></div>

    <!-- Используем созданный пресет react-classic вместо обычного -->
    <script type="text/babel" data-type="module" data-presets="react-classic">
        
        const { useState, useEffect, useCallback, Fragment } = React;
        
        // Прямые импорты Firebase
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // --- ИКОНКИ (SVG) ---
        const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
        const IconChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
        const IconArrowRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
        const IconBookOpen = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const IconBrain = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const IconLoader = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;

        // --- НАСТРОЙКИ API ---
        const defaultApiKey = ""; 

        // --- ИНИЦИАЛИЗАЦИЯ FIREBASE (Умная проверка) ---
        let app = null, auth = null, db = null;
        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
            // Инициализируем только если есть реальные ключи (иначе работаем через localStorage)
            if (firebaseConfig && Object.keys(firebaseConfig).length > 0) {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            }
        } catch (e) {
            console.warn("Облако отключено, используем локальное сохранение.");
        }
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'vocab-app-id';

        // --- Функция для взаимодействия с LLM (Gemini) ---
        const generateContent = async (prompt, jsonSchema = null, customApiKey = "") => {
            const activeKey = customApiKey || defaultApiKey;
            if (!activeKey) {
                throw new Error("API ключ не указан. Вернитесь в настройки и введите ключ.");
            }

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${activeKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "Ты — опытный преподаватель английского языка. Отвечай строго по формату." }] }
            };

            if (jsonSchema) {
                payload.generationConfig = {
                    responseMimeType: "application/json",
                    responseSchema: jsonSchema
                };
            }

            const delays = [1000, 2000, 4000, 8000, 16000];
            
            for (let i = 0; i <= delays.length; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`API Error: ${response.status} - ${errText}`);
                    }
                    
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (!text) throw new Error("Пустой ответ от API");
                    
                    return jsonSchema ? JSON.parse(text) : text;
                } catch (err) {
                    if (i === delays.length) throw err;
                    await new Promise(r => setTimeout(r, delays[i]));
                }
            }
        };

        // --- ГЛАВНЫЙ КОМПОНЕНТ ---
        function App() {
            const [stage, setStage] = useState('settings');
            const [currentExercise, setCurrentExercise] = useState(null);

            // Состояния по умолчанию (Загружаем из localStorage для локальной работы)
            const [settings, setSettings] = useState(() => {
                const saved = localStorage.getItem('vocab_settings');
                return saved ? JSON.parse(saved) : { level: 'A2', tenses: ['Present Simple'], userApiKey: '' };
            });
            const [dictionary, setDictionary] = useState(() => {
                const saved = localStorage.getItem('vocab_dictionary');
                return saved ? JSON.parse(saved) : [
                    { id: 1, en: 'maintain', ru: 'поддерживать' },
                    { id: 2, en: 'develop', ru: 'развивать' },
                    { id: 3, en: 'achieve', ru: 'достигать' },
                    { id: 4, en: 'improve', ru: 'улучшать' }
                ];
            });
            const [selectedWordIds, setSelectedWordIds] = useState(() => {
                const saved = localStorage.getItem('vocab_selected_ids');
                return saved ? JSON.parse(saved) : [1, 2, 3, 4];
            });
            
            // Дублируем в localStorage при любом обновлении данных (надежный бэкап)
            useEffect(() => { localStorage.setItem('vocab_settings', JSON.stringify(settings)); }, [settings]);
            useEffect(() => { localStorage.setItem('vocab_dictionary', JSON.stringify(dictionary)); }, [dictionary]);
            useEffect(() => { localStorage.setItem('vocab_selected_ids', JSON.stringify(selectedWordIds)); }, [selectedWordIds]);

            // Состояния для базы данных
            const [user, setUser] = useState(null);
            const [isReady, setIsReady] = useState(false);

            // 1. Авторизация в облаке (если доступно)
            useEffect(() => {
                if (!auth) {
                    setIsReady(true); // Если работаем локально (без Firebase) - сразу готовы
                    return;
                }
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Auth error:", error);
                        setIsReady(true);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // 2. Синхронизация данных с базой
            useEffect(() => {
                if (!user || !db) return;
                
                const userDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'userdata', 'main');
                const unsubscribe = onSnapshot(userDocRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        if (data.settings) setSettings(data.settings);
                        if (data.dictionary) setDictionary(data.dictionary);
                        if (data.selectedWordIds) setSelectedWordIds(data.selectedWordIds);
                    } else {
                        // Сохраняем дефолтные слова, если аккаунт новый
                        setDoc(userDocRef, { settings, dictionary, selectedWordIds }, { merge: true });
                    }
                    setIsReady(true);
                }, (err) => {
                    console.error("Firestore DB Error:", err);
                    setIsReady(true);
                });

                return () => unsubscribe();
            }, [user]);

            // 3. Умные функции сохранения (Пишут и в стейт, и в облако)
            const updateSettings = (action) => {
                setSettings(prev => {
                    const next = typeof action === 'function' ? action(prev) : action;
                    if (user && db) setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'userdata', 'main'), { settings: next }, { merge: true });
                    return next;
                });
            };

            const updateDictionary = (action) => {
                setDictionary(prev => {
                    const next = typeof action === 'function' ? action(prev) : action;
                    if (user && db) setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'userdata', 'main'), { dictionary: next }, { merge: true });
                    return next;
                });
            };

            const updateSelected = (action) => {
                setSelectedWordIds(prev => {
                    const next = typeof action === 'function' ? action(prev) : action;
                    if (user && db) setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'userdata', 'main'), { selectedWordIds: next }, { merge: true });
                    return next;
                });
            };

            if (!isReady) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center">
                        <IconLoader className="w-12 h-12 animate-spin text-indigo-600 mb-4" />
                        <p className="text-slate-500 font-medium">Загрузка данных...</p>
                    </div>
                );
            }

            const wordsForSession = dictionary.filter(w => selectedWordIds.includes(w.id));

            if (stage === 'settings') {
                return <SettingsStage settings={settings} setSettings={updateSettings} onNext={() => setStage('dictionary')} />;
            }

            if (stage === 'dictionary') {
                return (
                    <DictionaryStage 
                        dictionary={dictionary} 
                        setDictionary={updateDictionary} 
                        selectedWordIds={selectedWordIds}
                        setSelectedWordIds={updateSelected}
                        onBack={() => setStage('settings')} 
                        onNext={() => setStage('exercises')} 
                    />
                );
            }

            if (stage === 'exercises') {
                if (currentExercise === null) {
                    return <ExercisesMenu wordsCount={wordsForSession.length} onSelect={setCurrentExercise} onBack={() => setStage('dictionary')} />;
                }

                const ExerciseComponents = [null, Exercise1, Exercise2, Exercise3, Exercise4, Exercise5];
                const ExerciseComponent = ExerciseComponents[currentExercise];
                
                return (
                    <div className="min-h-screen bg-slate-50 p-4 md:p-8 animate-fade-in">
                        <div className="max-w-3xl mx-auto">
                            <button 
                                onClick={() => setCurrentExercise(null)}
                                className="flex items-center text-slate-500 hover:text-slate-800 mb-6 transition-colors"
                            >
                                <span className="w-5 h-5 mr-1 flex items-center justify-center"><IconChevronLeft /></span>
                                Назад к упражнениям
                            </button>
                            <ExerciseComponent words={wordsForSession} settings={settings} />
                        </div>
                    </div>
                );
            }

            return null;
        }

        // --- ЭТАП 1: НАСТРОЙКИ ---
        function SettingsStage({ settings, setSettings, onNext }) {
            const levels = ['A1', 'A2', 'B1', 'B2', 'C1', 'C2'];
            const allTenses = ['Present Simple', 'Past Simple', 'Future Simple', 'Present Continuous', 'Past Continuous', 'Present Perfect'];

            const toggleTense = (tense) => {
                setSettings(prev => ({
                    ...prev,
                    tenses: prev.tenses.includes(tense) 
                        ? prev.tenses.filter(t => t !== tense)
                        : [...prev.tenses, tense]
                }));
            };

            return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 animate-fade-in">
                    <div className="bg-white rounded-2xl shadow-xl p-6 md:p-8 max-w-md w-full">
                        <div className="flex items-center mb-6">
                            <span className="text-indigo-600 mr-3"><IconSettings /></span>
                            <h1 className="text-2xl font-bold">Настройки профиля</h1>
                        </div>

                        <div className="space-y-6">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Ваш уровень английского:</label>
                                <select 
                                    value={settings.level}
                                    onChange={(e) => setSettings({...settings, level: e.target.value})}
                                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                                >
                                    {levels.map(l => <option key={l} value={l}>{l}</option>)}
                                </select>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Знакомые времена:</label>
                                <div className="grid grid-cols-2 gap-2">
                                    {allTenses.map(tense => (
                                        <label key={tense} className="flex items-center space-x-2 p-2 bg-slate-50 rounded border cursor-pointer hover:bg-slate-100">
                                            <input 
                                                type="checkbox" 
                                                checked={settings.tenses.includes(tense)}
                                                onChange={() => toggleTense(tense)}
                                                className="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4"
                                            />
                                            <span className="text-sm">{tense}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-slate-100 p-4 rounded-xl">
                                <label className="block text-sm font-bold text-slate-800 mb-1">Ключ Google Gemini API:</label>
                                <p className="text-xs text-slate-600 mb-3 leading-relaxed">
                                    Нужен для умных упражнений (4 и 5). Бесплатный ключ можно получить за 1 минуту в <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-indigo-600 underline font-semibold hover:text-indigo-800 transition-colors">Google AI Studio</a>.
                                </p>
                                <input 
                                    type="password" 
                                    placeholder="Вставьте ключ сюда (AIzaSy...)"
                                    value={settings.userApiKey || ''}
                                    onChange={(e) => setSettings({...settings, userApiKey: e.target.value})}
                                    className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm"
                                />
                                {!settings.userApiKey && (
                                    <p className="text-xs text-amber-600 mt-2 font-medium">Внимание: Без ключа будут работать только базовые карточки (упражнения 1, 2, 3).</p>
                                )}
                            </div>

                            <button 
                                onClick={onNext}
                                disabled={settings.tenses.length === 0}
                                className="w-full bg-indigo-600 text-white font-medium py-3 rounded-lg hover:bg-indigo-700 transition-colors disabled:opacity-50 flex justify-center items-center"
                            >
                                Далее <span className="ml-2"><IconArrowRight /></span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- ЭТАП 2: СЛОВАРЬ ---
        function DictionaryStage({ dictionary, setDictionary, selectedWordIds, setSelectedWordIds, onBack, onNext }) {
            const [enInput, setEnInput] = useState('');
            const [ruInput, setRuInput] = useState('');

            const addWord = (e) => {
                e.preventDefault();
                if (!enInput.trim() || !ruInput.trim()) return;
                const newWord = { id: Date.now(), en: enInput.trim().toLowerCase(), ru: ruInput.trim().toLowerCase() };
                
                setDictionary([newWord, ...dictionary]);
                setSelectedWordIds([...selectedWordIds, newWord.id]); 
                
                setEnInput('');
                setRuInput('');
            };

            const deleteWord = (id) => {
                setDictionary(dictionary.filter(w => w.id !== id));
                setSelectedWordIds(selectedWordIds.filter(selectedId => selectedId !== id));
            };

            const toggleSelection = (id) => {
                if (selectedWordIds.includes(id)) {
                    setSelectedWordIds(selectedWordIds.filter(selectedId => selectedId !== id));
                } else {
                    setSelectedWordIds([...selectedWordIds, id]);
                }
            };

            const toggleAll = () => {
                if (selectedWordIds.length === dictionary.length) {
                    setSelectedWordIds([]);
                } else {
                    setSelectedWordIds(dictionary.map(w => w.id));
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 animate-fade-in">
                    <div className="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-6 md:p-8">
                        <button onClick={onBack} className="text-slate-500 hover:text-slate-800 mb-4 flex items-center">
                            <span className="w-4 h-4 mr-1 flex items-center justify-center"><IconChevronLeft/></span> Назад
                        </button>
                        
                        <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-4">
                            <div className="flex items-center">
                                <span className="w-8 h-8 text-indigo-600 mr-3 flex items-center justify-center"><IconBookOpen /></span>
                                <div>
                                    <h1 className="text-2xl font-bold">Мой словарь</h1>
                                    <p className="text-sm text-slate-500 mt-1">Все сохраненные слова</p>
                                </div>
                            </div>
                            <div className="bg-indigo-100 text-indigo-800 text-sm font-medium px-3 py-1 rounded-full inline-block self-start sm:self-auto">
                                Выбрано: {selectedWordIds.length} / {dictionary.length}
                            </div>
                        </div>

                        <form onSubmit={addWord} className="flex flex-col sm:flex-row gap-3 mb-6">
                            <input 
                                type="text" placeholder="Слово (напр. apple)" value={enInput} onChange={(e) => setEnInput(e.target.value)}
                                className="flex-1 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                            />
                            <input 
                                type="text" placeholder="Перевод (напр. яблоко)" value={ruInput} onChange={(e) => setRuInput(e.target.value)}
                                className="flex-1 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                            />
                            <button type="submit" className="bg-indigo-600 text-white p-3 rounded-lg hover:bg-indigo-700 transition flex items-center justify-center">
                                <IconPlus /> <span className="sm:hidden ml-2">Добавить</span>
                            </button>
                        </form>

                        <div className="flex justify-between items-center mb-4 px-2">
                            <label className="flex items-center text-sm text-slate-600 cursor-pointer hover:text-slate-900">
                                <input 
                                    type="checkbox" 
                                    checked={dictionary.length > 0 && selectedWordIds.length === dictionary.length}
                                    onChange={toggleAll}
                                    className="mr-2 rounded text-indigo-600 focus:ring-indigo-50 w-4 h-4 cursor-pointer"
                                />
                                Выбрать все
                            </label>
                            <span className="text-xs text-slate-400">Отметьте слова для тренировки</span>
                        </div>

                        <div className="space-y-3 mb-8 max-h-[50vh] overflow-y-auto pr-2">
                            {dictionary.length === 0 ? (
                                <p className="text-center text-gray-500 py-8">Словарь пуст. Добавьте свои первые слова!</p>
                            ) : (
                                dictionary.map(word => {
                                    const isSelected = selectedWordIds.includes(word.id);
                                    return (
                                        <div key={word.id} className={`flex justify-between items-center p-3 sm:p-4 rounded-lg border transition-colors ${isSelected ? 'bg-indigo-50 border-indigo-200' : 'bg-slate-50 border-slate-200'}`}>
                                            <div className="flex gap-3 sm:gap-4 w-full items-center cursor-pointer" onClick={() => toggleSelection(word.id)}>
                                                <input 
                                                    type="checkbox"
                                                    checked={isSelected}
                                                    onChange={() => {}} 
                                                    className="rounded text-indigo-600 focus:ring-indigo-500 w-5 h-5 pointer-events-none"
                                                />
                                                <div className="flex-1 flex flex-col sm:flex-row sm:gap-4">
                                                    <span className={`font-semibold text-base sm:text-lg flex-1 ${isSelected ? 'text-indigo-900' : 'text-slate-700'}`}>{word.en}</span>
                                                    <span className={`flex-1 text-sm sm:text-base ${isSelected ? 'text-indigo-700' : 'text-slate-500'}`}>{word.ru}</span>
                                                </div>
                                            </div>
                                            <button onClick={() => deleteWord(word.id)} className="text-slate-400 hover:text-red-500 p-2 transition-colors ml-2">
                                                <IconTrash />
                                            </button>
                                        </div>
                                    );
                                })
                            )}
                        </div>

                        <button 
                            onClick={onNext}
                            disabled={selectedWordIds.length < 4}
                            className="w-full bg-emerald-600 text-white font-medium py-4 rounded-xl hover:bg-emerald-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center text-lg shadow-lg hover:shadow-xl"
                        >
                            Перейти к тренировкам
                            {selectedWordIds.length < 4 && <span className="ml-2 text-sm font-normal opacity-80">(Мин. 4 слова)</span>}
                        </button>
                    </div>
                </div>
            );
        }

        // --- ЭТАП 3: МЕНЮ УПРАЖНЕНИЙ ---
        function ExercisesMenu({ wordsCount, onSelect, onBack }) {
            const exercises = [
                { id: 1, title: "Флеш-карточки", desc: "Классический перевод слов туда-обратно", color: "bg-blue-500" },
                { id: 2, title: "Найди пару", desc: "Сопоставление английских слов и переводов", color: "bg-purple-500" },
                { id: 3, title: "Написание", desc: "Ввод слова на английском по русскому переводу", color: "bg-pink-500" },
                { id: 4, title: "Заполнение пропусков", desc: "Нейросеть генерирует контекст под ваш уровень", color: "bg-amber-500", needsApi: true },
                { id: 5, title: "Активный перевод", desc: "Перевод целого предложения на английский", color: "bg-emerald-500", needsApi: true },
            ];

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 animate-fade-in">
                    <div className="max-w-4xl mx-auto">
                        <button onClick={onBack} className="text-slate-500 hover:text-slate-800 mb-6 flex items-center">
                            <span className="w-5 h-5 mr-1 flex items-center justify-center"><IconChevronLeft/></span> Назад к словарю
                        </button>

                        <div className="flex items-center mb-8">
                            <span className="w-10 h-10 text-indigo-600 mr-4 flex items-center justify-center"><IconBrain /></span>
                            <div>
                                <h1 className="text-3xl font-bold text-slate-800">Упражнения</h1>
                                <p className="text-slate-500 mt-1">Выберите режим для тренировки {wordsCount} слов</p>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {exercises.map(ex => (
                                <button 
                                    key={ex.id}
                                    onClick={() => onSelect(ex.id)}
                                    className="bg-white p-6 rounded-2xl shadow-sm hover:shadow-xl transition-all border border-slate-100 flex flex-col text-left group hover:-translate-y-1 relative overflow-hidden"
                                >
                                    <div className={`w-12 h-12 rounded-xl text-white flex items-center justify-center mb-4 ${ex.color}`}>
                                        <span className="font-bold text-xl">{ex.id}</span>
                                    </div>
                                    <h3 className="text-xl font-bold mb-2 text-slate-800 group-hover:text-indigo-600 transition-colors">{ex.title}</h3>
                                    <p className="text-slate-500 text-sm leading-relaxed">{ex.desc}</p>
                                    {ex.needsApi && <span className="absolute top-4 right-4 text-[10px] bg-amber-100 text-amber-800 px-2 py-1 rounded font-bold uppercase">AI</span>}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- УПРАЖНЕНИЯ ---

        function Exercise1({ words }) {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [direction, setDirection] = useState('en-ru'); 
            const [queue, setQueue] = useState([]);

            useEffect(() => {
                setQueue([...words].sort(() => Math.random() - 0.5));
                setDirection(Math.random() > 0.5 ? 'en-ru' : 'ru-en');
            }, [words]);

            const handleNext = () => {
                if (currentIndex < queue.length - 1) {
                    setCurrentIndex(prev => prev + 1);
                    setIsFlipped(false);
                    setDirection(Math.random() > 0.5 ? 'en-ru' : 'ru-en');
                } else {
                    setQueue([...words].sort(() => Math.random() - 0.5));
                    setCurrentIndex(0);
                    setIsFlipped(false);
                }
            };

            if (queue.length === 0) return null;

            const currentWord = queue[currentIndex];
            const front = direction === 'en-ru' ? currentWord.en : currentWord.ru;
            const back = direction === 'en-ru' ? currentWord.ru : currentWord.en;

            return (
                <div className="bg-white rounded-3xl shadow-lg p-6 md:p-8 max-w-lg mx-auto text-center animate-fade-in">
                    <h2 className="text-2xl font-bold mb-6 text-slate-800">Флеш-карточки</h2>
                    <p className="text-sm text-slate-500 mb-6">Слово {currentIndex + 1} из {queue.length}</p>
                    
                    <div 
                        className="bg-indigo-50 border-2 border-indigo-100 rounded-2xl p-8 md:p-12 min-h-[200px] md:min-h-[250px] flex items-center justify-center cursor-pointer hover:bg-indigo-100 transition-colors mb-8"
                        onClick={() => setIsFlipped(!isFlipped)}
                    >
                        <div className="text-2xl md:text-3xl font-medium text-slate-800 break-words w-full">
                            {isFlipped ? back : front}
                        </div>
                    </div>

                    <div className="flex gap-4 justify-center">
                        {!isFlipped ? (
                            <button onClick={() => setIsFlipped(true)} className="w-full sm:w-auto bg-indigo-600 text-white px-8 py-3 rounded-xl font-medium hover:bg-indigo-700 transition">
                                Показать ответ
                            </button>
                        ) : (
                            <button onClick={handleNext} className="w-full sm:w-auto bg-emerald-600 text-white px-8 py-3 rounded-xl font-medium hover:bg-emerald-700 transition flex items-center justify-center">
                                Дальше <span className="ml-2"><IconArrowRight /></span>
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        function Exercise2({ words }) {
            const [enList, setEnList] = useState([]);
            const [ruList, setRuList] = useState([]);
            const [selectedEn, setSelectedEn] = useState(null);
            const [selectedRu, setSelectedRu] = useState(null);
            const [matched, setMatched] = useState([]);
            const [error, setError] = useState(false);

            useEffect(() => {
                const en = [...words].sort(() => Math.random() - 0.5);
                const ru = [...words].sort(() => Math.random() - 0.5);
                setEnList(en);
                setRuList(ru);
            }, [words]);

            useEffect(() => {
                if (selectedEn && selectedRu) {
                    if (selectedEn.id === selectedRu.id) {
                        setMatched(prev => [...prev, selectedEn.id]);
                        setSelectedEn(null);
                        setSelectedRu(null);
                    } else {
                        setError(true);
                        setTimeout(() => {
                            setError(false);
                            setSelectedEn(null);
                            setSelectedRu(null);
                        }, 800);
                    }
                }
            }, [selectedEn, selectedRu]);

            if (matched.length > 0 && matched.length === words.length) {
                return (
                    <div className="bg-white rounded-3xl shadow-lg p-12 text-center max-w-lg mx-auto animate-fade-in">
                        <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6">
                            <IconCheck />
                        </div>
                        <h2 className="text-3xl font-bold mb-4 text-slate-800">Отлично!</h2>
                        <p className="text-slate-600 mb-8">Вы успешно нашли все пары.</p>
                        <button onClick={() => setMatched([])} className="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700">Заново</button>
                    </div>
                );
            }

            return (
                <div className="bg-white rounded-3xl shadow-lg p-4 md:p-8 animate-fade-in">
                    <h2 className="text-2xl font-bold mb-6 text-slate-800 text-center">Найди пару</h2>
                    <div className="grid grid-cols-2 gap-3 md:gap-8">
                        <div className="space-y-3">
                            {enList.map(word => {
                                const isMatched = matched.includes(word.id);
                                const isSelected = selectedEn?.id === word.id;
                                return (
                                    <button
                                        key={`en-${word.id}`}
                                        disabled={isMatched}
                                        onClick={() => setSelectedEn(word)}
                                        className={`w-full p-3 md:p-4 rounded-xl text-left text-sm md:text-base font-medium transition-all duration-300 break-words
                                            ${isMatched ? 'opacity-0 cursor-default' : ''}
                                            ${isSelected ? (error ? 'bg-red-500 text-white' : 'bg-indigo-600 text-white shadow-md') : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}
                                        `}
                                    >
                                        {word.en}
                                    </button>
                                );
                            })}
                        </div>
                        <div className="space-y-3">
                            {ruList.map(word => {
                                const isMatched = matched.includes(word.id);
                                const isSelected = selectedRu?.id === word.id;
                                return (
                                    <button
                                        key={`ru-${word.id}`}
                                        disabled={isMatched}
                                        onClick={() => setSelectedRu(word)}
                                        className={`w-full p-3 md:p-4 rounded-xl text-right text-sm md:text-base font-medium transition-all duration-300 break-words
                                            ${isMatched ? 'opacity-0 cursor-default' : ''}
                                            ${isSelected ? (error ? 'bg-red-500 text-white' : 'bg-indigo-600 text-white shadow-md') : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}
                                        `}
                                    >
                                        {word.ru}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        function Exercise3({ words }) {
            const [queue, setQueue] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [input, setInput] = useState('');
            const [feedback, setFeedback] = useState(null); 

            useEffect(() => {
                setQueue([...words].sort(() => Math.random() - 0.5));
            }, [words]);

            if (queue.length === 0) return null;

            const currentWord = queue[currentIndex];

            const checkAnswer = (e) => {
                e.preventDefault();
                if (input.trim().toLowerCase() === currentWord.en) {
                    setFeedback('correct');
                    setTimeout(() => {
                        setFeedback(null);
                        setInput('');
                        if (currentIndex < queue.length - 1) {
                            setCurrentIndex(prev => prev + 1);
                        } else {
                            setQueue([...words].sort(() => Math.random() - 0.5));
                            setCurrentIndex(0);
                        }
                    }, 1000);
                } else {
                    setFeedback('wrong');
                    setTimeout(() => setFeedback(null), 1000);
                }
            };

            return (
                <div className="bg-white rounded-3xl shadow-lg p-6 md:p-8 max-w-lg mx-auto text-center animate-fade-in">
                    <h2 className="text-2xl font-bold mb-8 text-slate-800">Напиши на английском</h2>
                    
                    <div className="text-sm text-slate-500 uppercase tracking-widest font-semibold mb-2">Переведите слово:</div>
                    <div className="text-3xl md:text-4xl font-bold text-indigo-600 mb-10">
                        {currentWord.ru}
                    </div>

                    <form onSubmit={checkAnswer} className="relative">
                        <input
                            type="text"
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            placeholder="Введите английское слово..."
                            className={`w-full p-4 pl-6 text-lg border-2 rounded-xl outline-none transition-colors
                                ${feedback === 'correct' ? 'border-emerald-500 bg-emerald-50 text-emerald-900' : 
                                  feedback === 'wrong' ? 'border-red-500 bg-red-50 text-red-900' : 'border-gray-200 focus:border-indigo-500'}
                            `}
                            autoFocus
                        />
                        <button type="submit" className="hidden">Проверить</button>
                    </form>
                    
                    <p className="mt-4 text-slate-400 text-sm">Нажмите Enter для проверки</p>
                </div>
            );
        }

        function Exercise4({ words, settings }) {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [selectedOption, setSelectedOption] = useState(null);
            const [isCorrect, setIsCorrect] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');

            const generateTask = useCallback(async () => {
                if (!settings.userApiKey) {
                    setErrorMsg('Пожалуйста, вернитесь в настройки и введите API ключ.');
                    return;
                }

                setLoading(true);
                setErrorMsg('');
                setData(null);
                setSelectedOption(null);
                setIsCorrect(null);
                
                const word = words[Math.floor(Math.random() * words.length)].en;

                const prompt = `Уровень: ${settings.level}. Времена: ${settings.tenses.join(', ')}. Слово: "${word}". Сгенерируй одно английское предложение для этого уровня, используя только выбранные времена. В предложении замени слово "${word}" на "___". Придумай 4 неправильных, но похожих варианта. Верни JSON.`;

                const schema = {
                    type: "OBJECT",
                    properties: {
                        sentence: { type: "STRING" },
                        options: { type: "ARRAY", items: { type: "STRING" } },
                        correct: { type: "STRING" }
                    },
                    required: ["sentence", "options", "correct"]
                };

                try {
                    const result = await generateContent(prompt, schema, settings.userApiKey);
                    result.options = result.options.sort(() => Math.random() - 0.5);
                    setData(result);
                } catch (error) {
                    setErrorMsg(error.message);
                } finally {
                    setLoading(false);
                }
            }, [words, settings]);

            useEffect(() => {
                generateTask();
            }, [generateTask]);

            const handleSelect = (opt) => {
                if (isCorrect !== null) return; 
                setSelectedOption(opt);
                setIsCorrect(opt === data.correct);
            };

            return (
                <div className="bg-white rounded-3xl shadow-lg p-6 md:p-8 max-w-2xl mx-auto animate-fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-xl md:text-2xl font-bold text-slate-800">Заполнение пропусков</h2>
                        <div className="px-3 py-1 bg-amber-100 text-amber-800 rounded-full text-[10px] md:text-xs font-bold uppercase tracking-wide">
                            {settings.level}
                        </div>
                    </div>

                    {errorMsg && (
                        <div className="bg-red-50 text-red-700 p-4 rounded-xl mb-6">
                            <p className="font-bold">Ошибка:</p>
                            <p className="text-sm">{errorMsg}</p>
                            {settings.userApiKey && <button onClick={generateTask} className="mt-3 bg-red-100 px-4 py-2 rounded hover:bg-red-200">Попробовать снова</button>}
                        </div>
                    )}

                    {loading ? (
                        <div className="py-20 flex flex-col items-center justify-center text-slate-500">
                            <IconLoader className="w-10 h-10 animate-spin mb-4 text-indigo-600" />
                            <p>Нейросеть генерирует...</p>
                        </div>
                    ) : data && (
                        <>
                            <div className="text-xl md:text-2xl leading-relaxed text-slate-800 font-medium mb-8 p-4 md:p-6 bg-slate-50 rounded-2xl border border-slate-100">
                                {data.sentence.split('___').map((part, i, arr) => (
                                    <Fragment key={i}>
                                        {part}
                                        {i < arr.length - 1 && (
                                            <span className={`inline-block px-2 md:px-4 mx-1 border-b-2 font-bold 
                                                ${isCorrect === true ? 'text-emerald-600 border-emerald-600' : 
                                                  isCorrect === false ? 'text-red-500 border-red-500' : 'text-indigo-600 border-indigo-300'}`}
                                            >
                                                {selectedOption ? selectedOption : '___'}
                                            </span>
                                        )}
                                    </Fragment>
                                ))}
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-8">
                                {data.options.map((opt, i) => {
                                    let btnStyle = "bg-white border-2 border-slate-200 text-slate-700 hover:border-indigo-400";
                                    if (selectedOption !== null) {
                                        if (opt === data.correct) {
                                            btnStyle = "bg-emerald-50 border-emerald-500 text-emerald-700 font-bold";
                                        } else if (opt === selectedOption && !isCorrect) {
                                            btnStyle = "bg-red-50 border-red-500 text-red-700";
                                        } else {
                                            btnStyle = "bg-white border-slate-200 text-slate-400 opacity-50";
                                        }
                                    }
                                    return (
                                        <button 
                                            key={i}
                                            onClick={() => handleSelect(opt)}
                                            disabled={selectedOption !== null}
                                            className={`p-3 md:p-4 rounded-xl text-base md:text-lg transition-all ${btnStyle}`}
                                        >
                                            {opt}
                                        </button>
                                    );
                                })}
                            </div>

                            {selectedOption !== null && (
                                <div className="flex justify-center animate-fade-in">
                                    <button onClick={generateTask} className="w-full sm:w-auto bg-indigo-600 text-white px-8 py-3 rounded-xl font-medium hover:bg-indigo-700 transition flex items-center justify-center">
                                        Следующее <span className="ml-2"><IconArrowRight /></span>
                                    </button>
                                </div>
                            )}
                        </>
                    )}
                </div>
            );
        }

        function Exercise5({ words, settings }) {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [checking, setChecking] = useState(false);
            const [input, setInput] = useState('');
            const [result, setResult] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');

            const generateTask = useCallback(async () => {
                if (!settings.userApiKey) {
                    setErrorMsg('Пожалуйста, вернитесь в настройки и введите API ключ.');
                    return;
                }

                setLoading(true);
                setErrorMsg('');
                setData(null);
                setInput('');
                setResult(null);
                
                const shuffledWords = [...words].sort(() => Math.random() - 0.5).slice(0, 2);
                const targetWords = shuffledWords.map(w => w.en);

                const prompt = `Уровень: ${settings.level}. Времена: ${settings.tenses.join(', ')}. Слова: ${targetWords.join(', ')}. Сгенерируй одно осмысленное предложение на РУССКОМ языке для перевода на английский. Студент должен обязательно использовать эти слова. Верни JSON.`;

                const schema = {
                    type: "OBJECT",
                    properties: {
                        russianSentence: { type: "STRING" },
                        targetEnglishWordsUsed: { type: "ARRAY", items: { type: "STRING" } }
                    },
                    required: ["russianSentence", "targetEnglishWordsUsed"]
                };

                try {
                    const res = await generateContent(prompt, schema, settings.userApiKey);
                    setData(res);
                } catch (error) {
                    setErrorMsg(error.message);
                } finally {
                    setLoading(false);
                }
            }, [words, settings]);

            useEffect(() => {
                generateTask();
            }, [generateTask]);

            const checkTranslation = async () => {
                if (!input.trim()) return;
                setChecking(true);
                setErrorMsg('');

                const prompt = `Уровень ${settings.level}. Русское: "${data.russianSentence}". Перевод: "${input}". Ожидались слова: ${data.targetEnglishWordsUsed.join(', ')}. Оцени правильность перевода, прости мелкие опечатки, но укажи на них. Верни JSON.`;

                const schema = {
                    type: "OBJECT",
                    properties: {
                        isCorrect: { type: "BOOLEAN" },
                        feedback: { type: "STRING" }
                    },
                    required: ["isCorrect", "feedback"]
                };

                try {
                    const res = await generateContent(prompt, schema, settings.userApiKey);
                    setResult(res);
                } catch (error) {
                    setErrorMsg(error.message);
                } finally {
                    setChecking(false);
                }
            };

            return (
                <div className="bg-white rounded-3xl shadow-lg p-6 md:p-8 max-w-3xl mx-auto animate-fade-in">
                    <div className="flex justify-between items-center mb-8">
                        <h2 className="text-xl md:text-2xl font-bold text-slate-800">Активный перевод</h2>
                        <div className="px-3 py-1 bg-emerald-100 text-emerald-800 rounded-full text-[10px] md:text-xs font-bold uppercase tracking-wide">
                            {settings.level}
                        </div>
                    </div>

                    {errorMsg && (
                        <div className="bg-red-50 text-red-700 p-4 rounded-xl mb-6">
                            <p className="font-bold">Ошибка API:</p>
                            <p className="text-sm">{errorMsg}</p>
                            {settings.userApiKey && <button onClick={generateTask} className="mt-3 bg-red-100 px-4 py-2 rounded hover:bg-red-200 text-sm">Обновить</button>}
                        </div>
                    )}

                    {loading ? (
                        <div className="py-20 flex flex-col items-center justify-center text-slate-500">
                            <IconLoader className="w-10 h-10 animate-spin mb-4 text-indigo-600" />
                            <p>Составляем предложение...</p>
                        </div>
                    ) : data && (
                        <div className="space-y-6">
                            <div className="bg-slate-50 p-4 md:p-6 rounded-2xl border border-slate-100">
                                <p className="text-xs md:text-sm text-slate-500 mb-2 uppercase tracking-wide font-semibold">Переведите:</p>
                                <p className="text-lg md:text-xl font-medium text-slate-800 leading-snug">{data.russianSentence}</p>
                                <div className="mt-4 flex flex-wrap gap-2 items-center">
                                    <span className="text-xs md:text-sm text-slate-400">Используйте:</span>
                                    {data.targetEnglishWordsUsed.map(w => (
                                        <span key={w} className="text-sm font-semibold text-indigo-600 bg-indigo-50 px-2 py-1 rounded">{w}</span>
                                    ))}
                                </div>
                            </div>

                            <textarea
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                placeholder="Введите перевод здесь..."
                                className="w-full p-4 md:p-5 border-2 border-slate-200 rounded-2xl outline-none focus:border-indigo-500 text-base md:text-lg transition-colors min-h-[120px] resize-none"
                                disabled={result !== null || checking}
                            />

                            {!result ? (
                                <button 
                                    onClick={checkTranslation}
                                    disabled={!input.trim() || checking}
                                    className="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-base md:text-lg hover:bg-indigo-700 transition flex items-center justify-center disabled:opacity-50"
                                >
                                    {checking ? <><IconLoader className="w-5 h-5 animate-spin mr-2" /> Проверяем...</> : 'Проверить перевод'}
                                </button>
                            ) : (
                                <div className={`p-4 md:p-6 rounded-2xl animate-fade-in ${result.isCorrect ? 'bg-emerald-50 border border-emerald-200' : 'bg-red-50 border border-red-200'}`}>
                                    <div className="flex items-start">
                                        <span className={`w-8 h-8 mr-3 shrink-0 flex items-center justify-center rounded-full ${result.isCorrect ? 'text-emerald-500 bg-emerald-100' : 'text-red-500 bg-red-100'}`}>
                                            {result.isCorrect ? <IconCheck /> : <IconX />}
                                        </span>
                                        <div>
                                            <h4 className={`text-base md:text-lg font-bold mb-2 ${result.isCorrect ? 'text-emerald-800' : 'text-red-800'}`}>
                                                {result.isCorrect ? 'Отличная работа!' : 'Есть ошибки'}
                                            </h4>
                                            <p className="text-sm md:text-base text-slate-700 leading-relaxed">{result.feedback}</p>
                                        </div>
                                    </div>
                                    
                                    <button 
                                        onClick={generateTask}
                                        className="mt-6 bg-white border border-slate-300 text-slate-700 px-6 py-3 rounded-xl font-medium hover:bg-slate-50 transition w-full"
                                    >
                                        Следующее предложение
                                    </button>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // Рендерим приложение
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
